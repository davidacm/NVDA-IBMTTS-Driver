name: Cleanup Old Diagnostics
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete old diagnostic releases
        uses: actions/github-script@v7
        with:
          script: |
            const daysToKeep = 7;
            const msToKeep = daysToKeep * 24 * 60 * 60 * 1000;
            const thresholdDate = new Date(Date.now() - msToKeep);

            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            for (const release of releases.data) {
              if (release.tag_name.startsWith('debug-issue-') && new Date(release.created_at) < thresholdDate) {
                console.log(`Deleting old release: ${release.name}`);

                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                });

                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`,
                });
              }
            }